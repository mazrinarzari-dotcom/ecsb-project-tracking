<!-- Project Deadline Tracker — single-file app.
     Works as-is here (data persists via window.storage). To self-host, see notes at bottom of chat. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ECSB Project Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#23264A">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#EEF0F6; --surface:#FFFFFF; --surface-2:#F7F8FC;
    --ink:#1A1C2E; --muted:#6B6F84; --faint:#9aa0b5; --line:#E2E5EF;
    --brand:#3D5AFE; --brand-deep:#23264A; --brand-soft:#E9ECFF;
    --ok:#1F9D6B; --ok-soft:#E2F5EC;
    --soon:#C9780A; --soon-soft:#FBEFD9;
    --late:#D64545; --late-soft:#FBE4E4;
    --done:#8A8FA3; --done-soft:#EDEEF3;
    --radius:14px; --shadow:0 1px 2px rgba(20,22,45,.06),0 8px 24px rgba(20,22,45,.06);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3{font-family:var(--disp);margin:0;letter-spacing:-.01em}
  .hidden{display:none!important}

  /* ---------- Login ---------- */
  #loginView{min-height:100%;display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 90% at 80% -10%,#2C3160 0%,#1A1C2E 55%,#14162a 100%)}
  .login-card{width:100%;max-width:380px;background:var(--surface);border-radius:18px;
    padding:32px 28px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .brandmark{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brandmark .dot{width:11px;height:11px;border-radius:50%;background:var(--brand);
    box-shadow:0 0 0 4px var(--brand-soft)}
  .brandmark b{font-family:var(--disp);font-size:19px;font-weight:700;letter-spacing:.02em}
  .login-card p.sub{color:var(--muted);margin:2px 0 22px;font-size:13.5px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  .field{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    background:var(--surface-2);outline:none;transition:.15s}
  .field:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft)}
  .btn{border:none;border-radius:10px;padding:11px 16px;font-weight:600;font-size:14.5px;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff;width:100%;margin-top:20px}
  .btn-primary:hover{background:#2f48d8}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--faint);color:var(--ink)}
  .err{color:var(--late);font-size:13px;margin-top:12px;min-height:18px}
  .hint{margin-top:18px;font-size:12px;color:var(--faint);text-align:center;line-height:1.6}

  /* ---------- Shell ---------- */
  #appView{display:grid;grid-template-columns:232px 1fr;min-height:100%}
  .side{background:var(--brand-deep);color:#cfd2e6;padding:22px 16px;display:flex;flex-direction:column;gap:4px}
  .side .brandmark b{color:#fff}
  .side .brandmark{margin-bottom:26px;padding:0 8px}
  .nav{background:none;border:none;color:#aeb2cf;text-align:left;padding:11px 12px;border-radius:10px;
    font-weight:500;display:flex;align-items:center;gap:11px;width:100%;font-size:14.5px}
  .nav:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav.active{background:var(--brand);color:#fff;font-weight:600}
  .nav .ic{width:18px;text-align:center;opacity:.9}
  .side .spacer{flex:1}
  .whoami{padding:11px 12px;border-top:1px solid rgba(255,255,255,.1);margin-top:8px;font-size:13px;color:#c7cae0}
  .whoami small{display:block;color:#8488ab;font-size:11.5px;margin-top:1px}
  .logout{margin-top:10px}

  .main{padding:30px 34px;max-width:1040px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .page-head h1{font-size:26px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  .stat-row{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .stat{padding:18px}
  .stat .n{font-family:var(--disp);font-size:32px;font-weight:700;line-height:1}
  .stat .l{color:var(--muted);font-size:13px;margin-top:6px}
  .stat.late .n{color:var(--late)} .stat.soon .n{color:var(--soon)} .stat.ok .n{color:var(--ok)}

  .section-title{font-size:13px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;
    color:var(--faint);margin:30px 0 12px}

  /* deadline list */
  .dl{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .dl:last-child{border-bottom:none}
  .dl .meta{flex:1;min-width:0}
  .dl .meta b{font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dl .meta span{color:var(--muted);font-size:13px}
  .count{font-family:var(--mono);font-weight:700;font-size:13px;padding:6px 10px;border-radius:999px;white-space:nowrap}
  .c-late{background:var(--late-soft);color:var(--late)}
  .c-soon{background:var(--soon-soft);color:var(--soon)}
  .c-ok{background:var(--ok-soft);color:var(--ok)}
  .c-done{background:var(--done-soft);color:var(--done)}
  .date-tag{font-family:var(--mono);font-size:12.5px;color:var(--muted);white-space:nowrap}

  /* projects */
  .proj{padding:18px 18px 16px}
  .proj+.proj{margin-top:14px}
  .proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .proj-top h3{font-size:18px}
  .proj-top .owner{color:var(--muted);font-size:13px;margin-top:2px}
  .proj .desc{color:var(--muted);font-size:13.5px;margin:8px 0 14px}
  .runway{height:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;position:relative;margin:6px 0 16px;overflow:hidden}
  .runway .fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--brand),#6f86ff);border-radius:999px}
  .ms{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px dashed var(--line)}
  .ms .tick{width:9px;height:9px;border-radius:50%;flex:none}
  .ms b{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ms.done b{text-decoration:line-through;color:var(--faint)}
  .row-actions{display:flex;gap:6px}
  .icon-btn{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12.5px;color:var(--muted)}
  .icon-btn:hover{border-color:var(--brand);color:var(--brand)}

  /* team */
  table{width:100%;border-collapse:collapse}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);text-align:left;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600}
  td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
  tr:last-child td{border-bottom:none}
  .pill{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand)}
  .pill.user{background:var(--done-soft);color:var(--done)}
  .seat{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .seat b{color:var(--ink)}
  .seat.full b{color:var(--late)}

  .toolbar{display:flex;gap:10px;align-items:center}
  .btn-add{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:10px 15px;font-weight:600;font-size:14px}
  .btn-add:hover{background:#2f48d8}
  .btn-add:disabled{background:var(--done);cursor:not-allowed}

  .empty{padding:40px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-family:var(--disp);font-size:17px;color:var(--ink);margin-bottom:6px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,22,45,.5);display:grid;place-items:center;padding:20px;z-index:50}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
  .modal h2{font-size:19px;margin-bottom:4px}
  .modal .msub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .modal-actions .btn{flex:1;margin:0}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .danger{color:var(--late);background:none;border:none;font-size:13px;font-weight:600;padding:8px 0}

  .banner{background:var(--soon-soft);border:1px solid #f2dca6;color:#8a5a00;border-radius:12px;
    padding:12px 16px;font-size:13.5px;margin-bottom:18px;display:flex;gap:10px;align-items:center}
  .banner button{margin-left:auto;background:#fff;border:1px solid #e7c98a;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;color:#8a5a00;white-space:nowrap}

  .part-info{color:var(--muted);font-size:13px;margin-top:4px}
  .part-info b{color:var(--ink);font-weight:600}

  @media(max-width:760px){
    #appView{grid-template-columns:1fr}
    .side{flex-direction:row;flex-wrap:wrap;padding:10px;gap:4px;align-items:center;position:sticky;top:0;z-index:10}
    .side .brandmark{margin:0 8px 0 4px}
    .side .spacer{display:none} .whoami{display:none}
    .nav{width:auto;padding:9px 11px} .nav .ic{display:none}
    .logout{margin:0}
    .main{padding:20px 16px}
    .two{grid-template-columns:1fr}
  }

  .login-logo{display:flex;justify-content:center;margin-bottom:16px}
  .login-logo img{max-width:250px;width:100%;height:auto}
  .login-title{font-size:21px;text-align:center;margin-bottom:2px}
  .logo-badge{width:30px;height:30px;border-radius:50%;flex:none}
  .brandtext{display:flex;flex-direction:column;line-height:1.05}
  .brandtext b{font-family:var(--disp);font-size:16px;font-weight:700;color:#fff;letter-spacing:.02em}
  .brandtext small{font-size:9px;color:#9398bd;letter-spacing:.14em;text-transform:uppercase;font-family:var(--mono);margin-top:2px}

  .proj-stats{grid-template-columns:repeat(auto-fill,minmax(212px,1fr))}
  .pstat{display:flex;align-items:center;gap:14px;padding:16px}
  .pstat .ring{flex:none}
  .pstat .ring circle.bar{transition:stroke-dashoffset .6s ease}
  .ring-num{font-family:var(--mono);font-weight:700;font-size:13.5px;fill:var(--ink)}
  .pstat-meta{min-width:0}
  .pstat-meta b{display:block;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pstat-meta span{display:block;color:var(--muted);font-size:12.5px;margin-top:3px}
  .pstat-meta .od{color:var(--late);font-weight:600}
</style>

<div id="modalRoot"></div>

<script>
/* ============ backend: Firebase if configured, else local preview ============ */
/* ▼▼▼ PASTE YOUR FIREBASE CONFIG HERE — see the setup guide. Nothing else to change. ▼▼▼ */
const firebaseConfig = {
  apiKey: "AIzaSyBVZ_C6bqxFnhybNr_G8424Wf342V8NAlw",
  authDomain: "ecsb-project-tracking-d2a89.firebaseapp.com",
  projectId: "ecsb-project-tracking-d2a89",
  storageBucket: "ecsb-project-tracking-d2a89.firebasestorage.app",
  messagingSenderId: "568276550725",
  appId: "1:568276550725:web:c4f0ac6dc682bd7b9ccf2c"
};
/* ▲▲▲ end of config ▲▲▲ */
const USE_FB = FB_CONFIG.apiKey && FB_CONFIG.apiKey.indexOf('PASTE')!==0 && typeof firebase!=='undefined';
let fdoc=null;
if(USE_FB){ try{ firebase.initializeApp(FB_CONFIG); fdoc=firebase.firestore().collection('app').doc('data'); }catch(e){ console.error('Firebase init failed',e); } }

const Mem={}; const hasStore=(typeof window!=='undefined' && window.storage && window.storage.get);
async function dbGet(){
  if(USE_FB&&fdoc){ try{ const s=await fdoc.get(); return s.exists? s.data().payload : null; }catch(e){ console.error(e); return null; } }
  if(hasStore){ try{ const r=await window.storage.get('trackdata',true); return r? JSON.parse(r.value):null; }catch(e){ return null; } }
  return Mem.trackdata||null;
}
async function dbSet(d){
  if(USE_FB&&fdoc){ try{ await fdoc.set({payload:d}); return; }catch(e){ console.error(e); } }
  if(hasStore){ try{ await window.storage.set('trackdata',JSON.stringify(d),true); return; }catch(e){} }
  Mem.trackdata=d;
}
async function hashPw(username,pw){
  const txt=(username||'').toLowerCase()+'::ecsb::'+pw;
  try{ if(typeof crypto!=='undefined'&&crypto.subtle){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); } }catch(e){}
  let h=5381; for(let i=0;i<txt.length;i++){ h=((h<<5)+h)+txt.charCodeAt(i); h|=0; } return 'f'+(h>>>0).toString(16);
}

/* ============ state ============ */
let DATA = null;          // {users, projects, settings}
let ME = null;            // current logged-in user (in memory only)
let TAB = 'dash';
const MAX_USERS = 40;

const uid = () => Math.random().toString(36).slice(2,9);
const todayISO = () => new Date().toISOString().slice(0,10);

async function init(){
  DATA = await dbGet();
  if(!DATA){
    DATA = {
      settings:{ appName:'ECSB Project Tracking', adminDefaultPw:true },
      users:[{ id:uid(), name:'Administrator', username:'admin', pass:await hashPw('admin','admin123'), phone:'', role:'admin' }],
      projects:[]
    };
    await dbSet(DATA);
  }
  document.getElementById('loginHint').textContent =
    DATA.settings.adminDefaultPw ? 'First time? Sign in as  admin / admin123' : '';
  document.getElementById('loginTitle').textContent = DATA.settings.appName;
}

/* ============ login ============ */
async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const err=document.getElementById('loginErr');
  const h=await hashPw(u,p);
  const found = DATA.users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.pass===h);
  if(!found){ err.textContent='Username or password is incorrect.'; return; }
  ME = found; err.textContent='';
  if(USE_FB&&fdoc&&!window._liveSub){ window._liveSub = fdoc.onSnapshot(s=>{
    if(!ME||!s.exists) return; const d=s.data().payload; if(!d) return;
    DATA=d; ME=DATA.users.find(x=>x.id===ME.id)||ME;
    if(document.getElementById('modalRoot').innerHTML==='') render();
  }); }
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('appView').classList.remove('hidden');
  document.getElementById('navTeam').style.display = ME.role==='admin' ? '' : 'none';
  document.getElementById('whoami').innerHTML = esc(ME.name)+'<small>'+(ME.role==='admin'?'Administrator':'Team member')+'</small>';
  TAB='dash'; render();
}
function logout(){
  ME=null;
  document.getElementById('appView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('lp').value='';
}

/* ============ date helpers ============ */
function daysLeft(iso){
  const d=new Date(iso+'T00:00:00'), t=new Date(todayISO()+'T00:00:00');
  return Math.round((d-t)/86400000);
}
function statusOf(ms){
  if(ms.done) return 'done';
  const dl=daysLeft(ms.due);
  if(dl<0) return 'late';
  if(dl<=7) return 'soon';
  return 'ok';
}
function countLabel(ms){
  if(ms.done) return {cls:'c-done',txt:'Done'};
  const dl=daysLeft(ms.due);
  if(dl<0) return {cls:'c-late',txt:Math.abs(dl)+'d overdue'};
  if(dl===0) return {cls:'c-soon',txt:'Due today'};
  if(dl<=7) return {cls:'c-soon',txt:dl+'d left'};
  return {cls:'c-ok',txt:dl+'d left'};
}
function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso+'T00:00:00').toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});
}
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* all milestones flattened with project ref */
function allMilestones(){
  const out=[];
  DATA.projects.forEach(p=>(p.milestones||[]).forEach(m=>out.push({...m,project:p})));
  return out;
}

/* ============ render ============ */
function render(){
  document.querySelectorAll('.nav[data-tab]').forEach(n=>n.classList.toggle('active',n.dataset.tab===TAB));
  const m=document.getElementById('main');
  if(TAB==='dash') m.innerHTML=viewDash();
  else if(TAB==='projects') m.innerHTML=viewProjects();
  else if(TAB==='team') m.innerHTML=viewTeam();
  else if(TAB==='settings') m.innerHTML=viewSettings();
}

function progressRing(pct,color){
  const r=27,C=2*Math.PI*r,off=C*(1-pct/100);
  return `<svg class="ring" width="64" height="64" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="${r}" fill="none" stroke="var(--line)" stroke-width="7"/>
    <circle class="bar" cx="32" cy="32" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 32 32)"/>
    <text x="32" y="32" text-anchor="middle" dominant-baseline="central" class="ring-num">${pct}%</text>
  </svg>`;
}
function viewDash(){
  const ms=allMilestones();
  const open=ms.filter(x=>!x.done);
  const late=open.filter(x=>statusOf(x)==='late');
  const soon=open.filter(x=>statusOf(x)==='soon');
  const ok=open.filter(x=>statusOf(x)==='ok');
  const upcoming=[...open].sort((a,b)=>a.due.localeCompare(b.due)).slice(0,12);

  let banner='';
  if(ME.role==='admin' && DATA.settings.adminDefaultPw){
    banner=`<div class="banner">⚠ You're still using the default admin password. Change it so no one else can get in.
      <button onclick="TAB='settings';render()">Change password</button></div>`;
  }
  const pstats = DATA.projects.map(p=>{
    const m=p.milestones||[]; const total=m.length;
    const done=m.filter(x=>x.done).length;
    const pct=total?Math.round(done/total*100):0;
    const overdue=m.filter(x=>!x.done&&statusOf(x)==='late').length;
    const color=overdue?'var(--late)':(total&&pct===100?'var(--ok)':'var(--brand)');
    return `<div class="card pstat">${progressRing(pct,color)}
      <div class="pstat-meta"><b>${esc(p.name)}</b>
      ${p.partNumber||p.partName?`<span>${esc([p.partNumber,p.partName].filter(Boolean).join(' — '))}</span>`:''}
      <span>${done}/${total} key dates done</span>
      ${overdue?`<span class="od">${overdue} overdue</span>`:''}</div></div>`;
  }).join('');
  const projHtml = DATA.projects.length
    ? `<div class="section-title">Progress by project</div><div class="grid proj-stats">${pstats}</div>`
    : '';
  return `${banner}
  <div class="page-head"><div><div class="eyebrow">Overview</div><h1>Key deadlines</h1></div></div>
  <div class="grid stat-row">
    <div class="card stat late"><div class="n">${late.length}</div><div class="l">Overdue</div></div>
    <div class="card stat soon"><div class="n">${soon.length}</div><div class="l">Due within 7 days</div></div>
    <div class="card stat ok"><div class="n">${ok.length}</div><div class="l">On track</div></div>
    <div class="card stat"><div class="n">${DATA.projects.length}</div><div class="l">Projects</div></div>
  </div>
  ${projHtml}
  <div class="section-title">Next up</div>
  <div class="card">
    ${upcoming.length? upcoming.map(rowDeadline).join('') :
      `<div class="empty"><div class="big">No open deadlines</div>Add a project and its key dates to see them here.</div>`}
  </div>`;
}
function rowDeadline(x){
  const c=countLabel(x);
  return `<div class="dl">
    <div class="meta"><b>${esc(x.title)}</b><span>${esc(x.project.name)}${x.project.partNumber?` · ${esc(x.project.partNumber)}`:''}</span></div>
    <span class="date-tag">${fmtDate(x.due)}</span>
    <span class="count ${c.cls}">${c.txt}</span>
  </div>`;
}

function viewProjects(){
  return `
  <div class="page-head">
    <div><div class="eyebrow">Workspace</div><h1>Projects</h1></div>
    <div class="toolbar"><button class="btn btn-ghost" onclick="downloadXls()">Download .xls</button><button class="btn-add" onclick="openProject()">+ New project</button></div>
  </div>
  ${DATA.projects.length? DATA.projects.map(projCard).join('') :
    `<div class="card"><div class="empty"><div class="big">No projects yet</div>Create your first project to start tracking key dates.</div></div>`}
  `;
}
function projCard(p){
  const ms=(p.milestones||[]).slice().sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const done=ms.filter(m=>m.done).length;
  const pct=ms.length? Math.round(done/ms.length*100):0;
  return `<div class="card proj">
    <div class="proj-top">
      <div><h3>${esc(p.name)}</h3>
        ${(p.partNumber||p.partName)?`<div class="part-info"><b>Part No:</b> ${esc(p.partNumber||'—')} &nbsp; <b>Part Name:</b> ${esc(p.partName||'—')}</div>`:''}
        <div class="owner">Owner: ${esc(p.owner||'—')} · ${done}/${ms.length} done</div></div>
      <div class="row-actions">
        <button class="icon-btn" onclick="openMilestone('${p.id}')">+ Key date</button>
        <button class="icon-btn" onclick="openProject('${p.id}')">Edit</button>
      </div>
    </div>
    ${p.desc?`<div class="desc">${esc(p.desc)}</div>`:''}
    <div class="runway"><div class="fill" style="width:${pct}%"></div></div>
    ${ms.length? ms.map(m=>msRow(p,m)).join('') :
      `<div style="color:var(--faint);font-size:13.5px;padding:6px 0">No key dates yet.</div>`}
  </div>`;
}
function msRow(p,m){
  const c=countLabel(m); const st=statusOf(m);
  const tickColor={late:'var(--late)',soon:'var(--soon)',ok:'var(--ok)',done:'var(--done)'}[st];
  return `<div class="ms ${m.done?'done':''}">
    <span class="tick" style="background:${tickColor}"></span>
    <b>${esc(m.title)}</b>
    <span class="date-tag">${fmtDate(m.due)}</span>
    <span class="count ${c.cls}">${c.txt}</span>
    <div class="row-actions">
      <button class="icon-btn" onclick="toggleDone('${p.id}','${m.id}')">${m.done?'Reopen':'Done'}</button>
      <button class="icon-btn" onclick="openMilestone('${p.id}','${m.id}')">Edit date</button>
    </div>
  </div>`;
}

function viewTeam(){
  if(ME.role!=='admin') return '';
  const n=DATA.users.length; const full=n>=MAX_USERS;
  return `
  <div class="page-head">
    <div><div class="eyebrow">Access</div><h1>Team</h1></div>
    <div class="toolbar">
      <span class="seat ${full?'full':''}"><b>${n}</b> / ${MAX_USERS} seats</span>
      <button class="btn-add" onclick="openUser()" ${full?'disabled':''}>+ Add member</button>
    </div>
  </div>
  <div class="card"><table>
    <thead><tr><th>Name</th><th>Username</th><th>Phone</th><th>Role</th><th></th></tr></thead>
    <tbody>${DATA.users.map(u=>`<tr>
      <td>${esc(u.name)}</td>
      <td><span class="seat">${esc(u.username)}</span></td>
      <td>${esc(u.phone)||'<span style="color:var(--faint)">—</span>'}</td>
      <td><span class="pill ${u.role==='admin'?'':'user'}">${u.role==='admin'?'Admin':'Member'}</span></td>
      <td style="text-align:right"><div class="row-actions" style="justify-content:flex-end">
        <button class="icon-btn" onclick="openUser('${u.id}')">Edit</button>

/* ============ modals ============ */
function modal(html){ document.getElementById('modalRoot').innerHTML=`<div class="scrim" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* --- project --- */
function openProject(id){
  const p = id? DATA.projects.find(x=>x.id===id) : null;
  modal(`<h2>${p?'Edit project':'New project'}</h2>
    <label>Project name</label><input id="pName" class="field" value="${p?esc(p.name):''}" placeholder="e.g. AMA02 Air Cleaner Development">
    <div class="two">
      <div><label>Part number</label><input id="pPartNo" class="field" value="${p?esc(p.partNumber||''):''}" placeholder="e.g. 1S7-E3440-09"></div>
      <div><label>Part name</label><input id="pPartName" class="field" value="${p?esc(p.partName||''):''}" placeholder="e.g. Air Cleaner Module"></div>
    </div>
    <label>Owner</label><input id="pOwner" class="field" value="${p?esc(p.owner||''):''}" placeholder="who's responsible">
    <label>Description</label><textarea id="pDesc" class="field" rows="3" placeholder="optional">${p?esc(p.desc||''):''}</textarea>
    <div class="err" id="pErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="margin:0" onclick="saveProject('${id||''}')">${p?'Save':'Create'}</button>
    </div>
    ${p?`<div style="text-align:center"><button class="danger" onclick="removeProject('${p.id}')">Delete this project</button></div>`:''}`);
}
async function saveProject(id){
  const name=document.getElementById('pName').value.trim();
  if(!name){ document.getElementById('pErr').textContent='Please enter a project name.'; return; }
  const partNumber=document.getElementById('pPartNo').value.trim();
  const partName=document.getElementById('pPartName').value.trim();
  const owner=document.getElementById('pOwner').value.trim();
  const desc=document.getElementById('pDesc').value.trim();
  if(id){ const p=DATA.projects.find(x=>x.id===id); Object.assign(p,{name,partNumber,partName,owner,desc}); }
  else DATA.projects.push({id:uid(),name,partNumber,partName,owner,desc,milestones:[]});
  await dbSet(DATA); closeModal(); render();
}
async function removeProject(id){
  if(!confirm('Delete this project and all its key dates?')) return;
  DATA.projects=DATA.projects.filter(x=>x.id!==id);
  await dbSet(DATA); closeModal(); render();
}

/* --- milestone (key date) --- */
function openMilestone(pid,mid){
  const p=DATA.projects.find(x=>x.id===pid);
  const m = mid? p.milestones.find(x=>x.id===mid):null;
  modal(`<h2>${m?'Update key date':'Add key date'}</h2>
    <p class="msub">${esc(p.name)}</p>
    <label>What is the milestone?</label><input id="mTitle" class="field" value="${m?esc(m.title):''}" placeholder="e.g. Beta release">
    <label>Deadline</label><input id="mDue" class="field" type="date" value="${m?m.due:todayISO()}">
    <div class="err" id="mErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="margin:0" onclick="saveMilestone('${pid}','${mid||''}')">${m?'Save':'Add'}</button>
    </div>
    ${m?`<div style="text-align:center"><button class="danger" onclick="removeMilestone('${pid}','${m.id}')">Delete this key date</button></div>`:''}`);
}
async function saveMilestone(pid,mid){
  const p=DATA.projects.find(x=>x.id===pid);
  const title=document.getElementById('mTitle').value.trim();
  const due=document.getElementById('mDue').value;
  if(!title||!due){ document.getElementById('mErr').textContent='Enter a name and a date.'; return; }
  if(mid){ const m=p.milestones.find(x=>x.id===mid); m.title=title; m.due=due; }
  else { p.milestones=p.milestones||[]; p.milestones.push({id:uid(),title,due,done:false}); }
  await dbSet(DATA); closeModal(); render();
}
async function removeMilestone(pid,mid){
  const p=DATA.projects.find(x=>x.id===pid);
  p.milestones=p.milestones.filter(x=>x.id!==mid);
  await dbSet(DATA); closeModal(); render();
}
async function toggleDone(pid,mid){
  const p=DATA.projects.find(x=>x.id===pid);
  const m=p.milestones.find(x=>x.id===mid); m.done=!m.done;
  await dbSet(DATA); render();
}

/* --- users --- */
function openUser(id){
  const u = id? DATA.users.find(x=>x.id===id):null;
  modal(`<h2>${u?'Edit member':'Add member'}</h2>
    <label>Full name</label><input id="uName" class="field" value="${u?esc(u.name):''}">
    <div class="two">
      <div><label>Username</label><input id="uUser" class="field" value="${u?esc(u.username):''}"></div>
      <div><label>Phone number</label><input id="uPhone" class="field" value="${u?esc(u.phone):''}" placeholder="01x-xxxxxxx"></div>
    </div>
    <label>Password ${u?'(leave blank to keep)':''}</label><input id="uPw" class="field" type="text" placeholder="${u?'unchanged':'set a password'}">
    <label>Role</label>
    <select id="uRole" class="field"><option value="member" ${u&&u.role==='member'?'selected':''}>Team member</option>
      <option value="admin" ${u&&u.role==='admin'?'selected':''}>Administrator</option></select>
    <div class="err" id="uErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="margin:0" onclick="saveUser('${id||''}')">${u?'Save':'Add member'}</button>
    </div>`);
}
async function saveUser(id){
  const name=document.getElementById('uName').value.trim();
  const username=document.getElementById('uUser').value.trim();
  const phone=document.getElementById('uPhone').value.trim();
  const pw=document.getElementById('uPw').value;
  const role=document.getElementById('uRole').value;
  const err=document.getElementById('uErr');
  if(!name||!username){ err.textContent='Name and username are required.'; return; }
  const clash=DATA.users.find(x=>x.username.toLowerCase()===username.toLowerCase() && x.id!==id);
  if(clash){ err.textContent='That username is already taken.'; return; }
  if(id){
    const u=DATA.users.find(x=>x.id===id);
    Object.assign(u,{name,username,phone,role}); if(pw) u.pass=await hashPw(username,pw);
  } else {
    if(DATA.users.length>=MAX_USERS){ err.textContent='You have reached the 40-seat limit.'; return; }
    if(!pw){ err.textContent='Please set a password for the new member.'; return; }
    DATA.users.push({id:uid(),name,username,phone,pass:await hashPw(username,pw),role});
  }
  await dbSet(DATA); closeModal(); render();
}
async function removeUser(id){
  const u=DATA.users.find(x=>x.id===id);
  if(!confirm('Remove '+u.name+'? They will lose access.')) return;
  if(u.role==='admin' && DATA.users.filter(x=>x.role==='admin').length<=1){ alert('You need at least one administrator.'); return; }
  DATA.users=DATA.users.filter(x=>x.id!==id);
  await dbSet(DATA); render();
}

/* --- settings --- */
async function changePw(){
  const cur=document.getElementById('sCur').value, nw=document.getElementById('sNew').value;
  const err=document.getElementById('sErr');
  if(await hashPw(ME.username,cur)!==ME.pass){ err.textContent='Current password is wrong.'; return; }
  if(nw.length<4){ err.textContent='Use at least 4 characters.'; return; }
  const nh=await hashPw(ME.username,nw); ME.pass=nh; const u=DATA.users.find(x=>x.id===ME.id); u.pass=nh;
  if(ME.username==='admin') DATA.settings.adminDefaultPw=false;
  await dbSet(DATA); err.style.color='var(--ok)'; err.textContent='Password updated.';
  document.getElementById('sCur').value=''; document.getElementById('sNew').value='';
}
async function saveName(){
  DATA.settings.appName=document.getElementById('sName').value.trim()||'ECSB Project Tracking';
  await dbSet(DATA); alert('Saved.');
}

/* ============ Excel export ============ */
function xlsCell(v){ return esc(v).replace(/\n/g,'<br>'); }
function downloadXls(){
  const rows=[];
  DATA.projects.forEach(p=>{
    const ms=(p.milestones&&p.milestones.length)?p.milestones:[null];
    ms.forEach(m=>rows.push({
      project:p.name||'', partNumber:p.partNumber||'', partName:p.partName||'', owner:p.owner||'',
      description:p.desc||'', milestone:m?m.title:'', deadline:m?m.due:'', status:m?(m.done?'Done':statusOf(m)):'', days:m?daysLeft(m.due):''
    }));
  });
  const head=['Project','Part Number','Part Name','Owner','Description','Milestone / Key Date','Deadline','Status','Days Left'];
  const body=rows.map(r=>`<tr><td>${xlsCell(r.project)}</td><td>${xlsCell(r.partNumber)}</td><td>${xlsCell(r.partName)}</td><td>${xlsCell(r.owner)}</td><td>${xlsCell(r.description)}</td><td>${xlsCell(r.milestone)}</td><td>${xlsCell(r.deadline)}</td><td>${xlsCell(r.status)}</td><td>${xlsCell(r.days)}</td></tr>`).join('');
  const html=`<!doctype html><html><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table></body></html>`;
  const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ECSB_Project_Tracking_${todayISO()}.xls`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
